name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest ruff pyyaml pandas
          pip install fastapi pydantic requests
          pip install pandera python-dotenv openai structlog
          pip install sentence-transformers

      - name: Lint with ruff
        run: ruff check .

      - name: Run unit tests
        run: pytest tests/test_tools.py tests/test_parser.py tests/test_validation.py -v

      - name: Run agent integration tests
        run: pytest tests/test_agent.py -v

      - name: Validate training data schema
        run: pytest tests/test_validation.py -v